<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPMotion Real-Time Monitor</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- MQTT.js -->
    <script src="https://unpkg.com/mqtt@5.3.0/dist/mqtt.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card.compact {
            padding: 12px 20px;
        }

        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .collapsible-header:hover {
            opacity: 0.8;
        }

        .collapsible-header h2 {
            margin: 0;
            font-size: 1.2em;
        }

        .collapsible-content {
            margin-top: 15px;
        }

        .collapsible-content.collapsed {
            display: none;
        }

        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            font-size: 0.9em;
        }

        .input-group input {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-sm {
            padding: 6px 15px;
            font-size: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #2ecc71;
        }

        .status-indicator.disconnected {
            background: #e74c3c;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .metric-card {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-3px);
        }

        .metric-card.idle {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }

        .metric-card.motion {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .metric-card.neutral {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
        }

        .metric-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .chart-container {
            position: relative;
            height: 600px;
            margin-bottom: 10px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title {
            font-size: 1.3em;
            margin: 0;
        }

        .arrow {
            transition: transform 0.3s;
            font-size: 0.9em;
        }

        .arrow.rotate {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🛜 ESPMotion</h1>
            <p>Real-Time Motion Detection Monitor</p>
        </div>

        <!-- MQTT Connection Card -->
        <div class="card compact">
            <div class="collapsible-header" onclick="toggleConfig()" style="display: flex; align-items: center; gap: 15px;">
                <h2 style="margin: 0;">🔌 MQTT Connection</h2>
                <div class="status-item" style="margin-left: auto;">
                    <div class="status-indicator disconnected" id="statusIndicator"></div>
                    <span id="statusText">Disconnected</span>
                </div>
                <span class="arrow" id="configArrow">▼</span>
            </div>
            <div class="collapsible-content" id="configContent">
                <div class="config-section">
                    <div class="input-group">
                        <label for="broker">Broker Address</label>
                        <input type="text" id="broker" placeholder="localhost" value="localhost">
                    </div>
                    <div class="input-group">
                        <label for="port">WebSocket Port</label>
                        <input type="number" id="port" placeholder="9001" value="9001">
                    </div>
                    <div class="input-group">
                        <label for="topic">Topic</label>
                        <input type="text" id="topic" placeholder="home/espmotion/node1" value="home/espmotion/node1">
                    </div>
                    <div class="input-group">
                        <label for="username">Username (optional)</label>
                        <input type="text" id="username" placeholder="user" value="mqtt">
                    </div>
                    <div class="input-group">
                        <label for="password">Password (optional)</label>
                        <input type="password" id="password" placeholder="password" value="mqtt">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn btn-primary" id="connectBtn" onclick="toggleConnection()">Connect</button>
                    <button class="btn btn-danger" id="clearBtn" onclick="clearData()" style="display: none;">Clear Data</button>
                </div>
            </div>
        </div>

        <!-- Metrics Cards (Fixed) -->
        <div class="card compact">
            <div class="metrics-grid">
                <div class="metric-card idle" id="stateCard">
                    <div class="metric-label">State</div>
                    <div class="metric-value" id="stateValue">-</div>
                </div>
                <div class="metric-card neutral">
                    <div class="metric-label">Movement</div>
                    <div class="metric-value" id="movementValue">-</div>
                </div>
                <div class="metric-card neutral">
                    <div class="metric-label">Last Update</div>
                    <div class="metric-value" id="lastUpdate">-</div>
                </div>
            </div>
        </div>

        <!-- Chart  (Fixed) -->
        <div class="card">
            <div class="chart-header">
                <h2 class="chart-title" id="chartTitle">📈 Real-Time Chart</h2>
                <button class="btn btn-warning btn-sm" id="pauseBtn" onclick="togglePause()">⏸️ Pause</button>
            </div>
            <div class="chart-container">
                <canvas id="motionChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        let client = null;
        let chart = null;
        let maxDataPoints = 60;
        let isPaused = false;
        let pendingData = [];

        const chartData = {
            labels: [],
            movement: [],
            threshold: [],
            pps: [],
            packets_dropped: []
        };

        // Initialize Chart
        function initChart() {
            const ctx = document.getElementById('motionChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [
                        {
                            label: 'Movement',
                            data: chartData.movement,
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Threshold',
                            data: chartData.threshold,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0,
                            fill: false,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Packets/sec',
                            data: chartData.pps,
                            borderColor: '#2ecc71',
                            backgroundColor: 'rgba(46, 204, 113, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: false,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Dropped',
                            data: chartData.packets_dropped,
                            borderColor: '#f39c12',
                            backgroundColor: 'rgba(243, 156, 18, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: false,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 300
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Movement / Threshold'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'CSI Packets'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Time'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    }
                }
            });
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pauseBtn');
            const chartTitle = document.getElementById('chartTitle');

            if (isPaused) {
                pauseBtn.textContent = '▶️ Resume';
                pauseBtn.classList.remove('btn-warning');
                pauseBtn.classList.add('btn-success');
                chartTitle.textContent = '📈 Real-Time Chart (PAUSED)';
            } else {
                pauseBtn.textContent = '⏸️ Pause';
                pauseBtn.classList.remove('btn-success');
                pauseBtn.classList.add('btn-warning');
                chartTitle.textContent = '📈 Real-Time Chart';

                // Add all pending data when resuming
                if (pendingData.length > 0) {
                    pendingData.forEach(data => addDataToChart(data));
                    pendingData = [];
                }
            }
        }

        function toggleConfig() {
            const content = document.getElementById('configContent');
            const arrow = document.getElementById('configArrow');
            content.classList.toggle('collapsed');
            arrow.classList.toggle('rotate');
        }

        function toggleConnection() {
            if (client && client.connected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            const broker = document.getElementById('broker').value;
            const port = document.getElementById('port').value;
            const topic = document.getElementById('topic').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!broker || !port || !topic) {
                alert('Please fill in all required fields!');
                return;
            }

            const connectUrl = `ws://${broker}:${port}/mqtt`;

            const options = {
                clean: true,
                connectTimeout: 4000,
                clientId: 'espmotion_monitor_' + Math.random().toString(16).substr(2, 8)
            };

            if (username) options.username = username;
            if (password) options.password = password;

            try {
                client = mqtt.connect(connectUrl, options);

                client.on('connect', () => {
                    console.log('Connected to MQTT broker');
                    updateStatus(true);
                    document.getElementById('configContent').classList.add('collapsed');
                    document.getElementById('configArrow').classList.add('rotate');

                    // Subscribe to the data topic (monitor-only: no command topics)
                    client.subscribe(topic, (err) => {
                        if (err) {
                            console.error('Subscribe error:', err);
                            alert('Error subscribing to topic!');
                        } else {
                            console.log('Subscribed to:', topic);
                        }
                    });
                });

                client.on('message', (topic, message) => {
                    // Text message - parse as JSON
                    handleMessage(message.toString());
                });

                client.on('error', (err) => {
                    console.error('Connection error:', err);
                    alert('Connection error: ' + err.message);
                    updateStatus(false);
                });

                client.on('close', () => {
                    console.log('Connection closed');
                    updateStatus(false);
                });

            } catch (err) {
                console.error('Connection error:', err);
                alert('Connection error: ' + err.message);
            }
        }

        function disconnect() {
            if (client) {
                client.end();
                client = null;
                updateStatus(false);
            }
        }

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const clearBtn = document.getElementById('clearBtn');

            if (connected) {
                indicator.classList.remove('disconnected');
                indicator.classList.add('connected');
                statusText.textContent = 'Connected';
                connectBtn.textContent = 'Disconnect';
                connectBtn.classList.remove('btn-primary');
                connectBtn.classList.add('btn-danger');
                clearBtn.style.display = 'inline-block';
            } else {
                indicator.classList.remove('connected');
                indicator.classList.add('disconnected');
                statusText.textContent = 'Disconnected';
                connectBtn.textContent = 'Connect';
                connectBtn.classList.remove('btn-danger');
                connectBtn.classList.add('btn-primary');
                clearBtn.style.display = 'none';
            }
        }


        function addDataToChart(data) {
            const now = new Date();
            const timeLabel = now.toLocaleTimeString('en-US');

            // Use PPS calculated server-side (with ms precision)
            const pps = data.pps || 0;

            chartData.labels.push(timeLabel);
            chartData.movement.push(data.movement || 0);
            chartData.threshold.push(data.threshold || 0);
            chartData.pps.push(pps);
            chartData.packets_dropped.push(data.packets_dropped || 0);

            if (chartData.labels.length > maxDataPoints) {
                chartData.labels.shift();
                chartData.movement.shift();
                chartData.threshold.shift();
                chartData.pps.shift();
                chartData.packets_dropped.shift();
            }

            chart.update('none');
        }

        function updateMetrics(data) {
            const stateCard = document.getElementById('stateCard');
            const stateValue = document.getElementById('stateValue');
            stateValue.textContent = data.state === 'motion' ? 'MOTION' : 'IDLE';

            if (data.state === 'motion') {
                stateCard.classList.remove('idle');
                stateCard.classList.add('motion');
            } else {
                stateCard.classList.remove('motion');
                stateCard.classList.add('idle');
            }

            document.getElementById('movementValue').textContent =
                data.movement ? data.movement.toFixed(2) : '-';
        }

        function clearData() {
            chartData.labels = [];
            chartData.movement = [];
            chartData.threshold = [];
            chartData.pps = [];
            chartData.packets_dropped = [];
            pendingData = [];

            document.getElementById('lastUpdate').textContent = '-';

            chart.update();
        }

        // Message handler - monitor-only: just live detection data
        function handleMessage(message) {
            try {
                const data = JSON.parse(message);

                // Regular data message (has movement, threshold, state)
                if (data.movement !== undefined || data.threshold !== undefined || data.state) {
                    const now = new Date();
                    document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('it-IT', { hour12: false });

                    updateMetrics(data);

                    if (isPaused) {
                        pendingData.push(data);
                    } else {
                        addDataToChart(data);
                    }
                }

            } catch (err) {
                console.error('Error parsing message:', err);
            }
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initChart();
        });
    </script>
</body>

</html>
